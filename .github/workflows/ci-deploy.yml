# =============================================================================
# Backend CI/CD Workflow
# =============================================================================
# Staggered deployments: dev → staging → prod (with manual approval for prod)
# Uses GitHub OIDC for secure AWS authentication (no long-lived credentials).
# =============================================================================

name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to specific environment only"
        required: false
        type: choice
        options:
          - all
          - dev
          - staging
          - prod
      fast_deploy:
        description: "Fast deploy: skip tests, SSM restart instead of ASG refresh"
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: isol8-backend

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # CI: Run tests and linting
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.fast_deploy == 'true') }}

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: isol8_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff pre-commit

      - name: Run linting
        run: |
          ruff check .
          ruff format --check .

      - name: Initialize database schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/isol8_test
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DEBUG: "false"
        run: |
          python init_db.py --reset

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/isol8_test
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DEBUG: "false"
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Build: Build and push Docker image to ECR
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Deploy to Dev (automatic via ASG Instance Refresh)
  # ===========================================================================
  # Uses ASG instance refresh for zero-downtime rolling deployments.
  # New instances boot with user_data.sh which:
  #   1. Pulls latest Docker image from ECR
  #   2. Starts the backend container
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev'))
      )
    environment:
      name: dev
      url: https://api-dev.isol8.co

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =====================================================================
      # Fast Deploy: SSM pull + restart (skips ASG refresh, ~2 min)
      # =====================================================================
      - name: "[Fast] SSM Deploy - pull image and restart container"
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fast_deploy == 'true' }}
        run: |
          ASG_NAME="isol8-dev-asg"
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[0].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No instances found in ASG $ASG_NAME"
            exit 1
          fi

          echo "Fast deploying to $INSTANCE_ID..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 180 \
            --parameters 'commands=[
              "set -e",
              "echo \"=== Pulling latest image ===\"",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin '"${{ steps.login-ecr.outputs.registry }}"'",
              "docker pull '"${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"'",
              "echo \"=== Restarting via systemd ===\"",
              "systemctl restart isol8",
              "echo \"=== Waiting for container to start ===\"",
              "for i in $(seq 1 30); do docker inspect isol8 --format={{.State.Running}} 2>/dev/null && break || true; done",
              "echo \"=== Resetting database schema ===\"",
              "docker exec isol8 python init_db.py --reset",
              "echo \"=== Container status ===\"",
              "docker ps --filter name=isol8",
              "echo \"=== Done ===\""
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "Waiting for command to complete..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)

          echo "=== Command Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text

          if [ "$STATUS" != "Success" ]; then
            echo "=== Error Output ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text
            exit 1
          fi

      # =====================================================================
      # Normal Deploy: ASG Instance Refresh (full replacement, ~15 min)
      # =====================================================================
      - name: Reset Database Schema
        if: ${{ !(github.event_name == 'workflow_dispatch' && (github.event.inputs.fast_deploy == 'true')) }}
        run: |
          ASG_NAME="isol8-dev-asg"

          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[0].InstanceId' \
            --output text)

          echo "Resetting database schema on CURRENT instance $INSTANCE_ID before refresh..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 120 \
            --parameters 'commands=[
              "echo \"=== Resetting database schema ===\"",
              "if docker ps --format {{.Names}} | grep -q isol8; then docker exec isol8 python init_db.py --reset && echo \"=== Schema reset complete ===\"; else echo \"Container not running - skipping (new instance will handle schema via user_data.sh)\"; fi"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "Waiting for schema reset to complete..."

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)

          echo "=== Schema Reset Output ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text

          if [ "$STATUS" != "Success" ]; then
            echo "=== Schema Reset Error Output ==="
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text
            exit 1
          fi

          echo "Database migrations completed successfully on current instance"

      - name: Trigger ASG Instance Refresh
        if: ${{ !(github.event_name == 'workflow_dispatch' && (github.event.inputs.fast_deploy == 'true')) }}
        run: |
          ASG_NAME="isol8-dev-asg"

          echo "Triggering instance refresh for $ASG_NAME..."
          echo "New instances will boot with:"
          echo "  - Latest Docker image: ${{ env.ECR_REPOSITORY }}:latest"

          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "Instance refresh started: $REFRESH_ID"
          echo "REFRESH_ID=$REFRESH_ID" >> $GITHUB_ENV

      - name: Wait for Instance Refresh
        if: ${{ !(github.event_name == 'workflow_dispatch' && (github.event.inputs.fast_deploy == 'true')) }}
        run: |
          ASG_NAME="isol8-dev-asg"
          REFRESH_ID=${{ env.REFRESH_ID }}

          echo "Waiting for instance refresh $REFRESH_ID to complete..."
          echo "This performs a rolling update - one instance at a time"

          for i in {1..90}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            PROGRESS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text)

            echo "Status: $STATUS, Progress: ${PROGRESS}%"

            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed with status: $STATUS"

              aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name $ASG_NAME \
                --instance-refresh-ids $REFRESH_ID \
                --query 'InstanceRefreshes[0].StatusReason' \
                --output text

              exit 1
            fi

            sleep 10
          done

          echo "Timeout waiting for instance refresh"
          exit 1

      - name: Health check
        run: |
          API_URL="https://api-dev.isol8.co"

          echo "Checking health at $API_URL/health"

          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed"
          exit 1

  # ===========================================================================
  # Deploy to Staging (DISABLED - instances stopped to save costs)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: false  # DISABLED - staging instance stopped to save costs
    environment:
      name: staging
      url: https://api-staging.isol8.co
    env:
      CORS_ORIGINS: https://staging.isol8.co,https://staging.town.isol8.co

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-staging-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSM
        run: |
          ASG_NAME="isol8-staging-asg"
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instances found in ASG $ASG_NAME"
            exit 1
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Deploying to $INSTANCE_ID..."

            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=[
                "aws ecr get-login-password --region '"${{ env.AWS_REGION }}"' | docker login --username AWS --password-stdin '"${{ steps.login-ecr.outputs.registry }}"'",
                "docker pull '"${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"'",
                "docker stop isol8 || true",
                "docker rm isol8 || true",
                "docker run -d --name isol8 --env-file /home/ec2-user/.env -e CORS_ORIGINS=${{ env.CORS_ORIGINS }} -p 8000:8000 --restart unless-stopped '"${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"'"
              ]' \
              --query 'Command.CommandId' \
              --output text)

            aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text
          done

      - name: Run database migrations
        run: |
          ASG_NAME="isol8-staging-asg"
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[0].InstanceId' \
            --output text)

          sleep 10

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker exec isol8 python init_db.py --reset"]' \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query '[Status, StandardOutputContent]' --output text

      - name: Health check
        run: |
          API_URL=$(aws apigatewayv2 get-apis --query "Items[?Name=='isol8-staging-api'].ApiEndpoint" --output text)
          echo "Checking health at $API_URL/health"

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --max-time 5 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 5s..."
            sleep 5
          done

          echo "Health check failed"
          exit 1

  # ===========================================================================
  # Deploy to Production (DISABLED - instances stopped to save costs)
  # ===========================================================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: false  # DISABLED - production instance stopped to save costs
    environment:
      name: production
      url: https://api.isol8.co
    env:
      CORS_ORIGINS: https://app.isol8.co,https://town.isol8.co

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-prod-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSM
        run: |
          ASG_NAME="isol8-prod-asg"
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instances found in ASG $ASG_NAME"
            exit 1
          fi

          echo "Deploying to instances: $INSTANCE_IDS"

          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Deploying to $INSTANCE_ID..."

            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=[
                "aws ecr get-login-password --region '"${{ env.AWS_REGION }}"' | docker login --username AWS --password-stdin '"${{ steps.login-ecr.outputs.registry }}"'",
                "docker pull '"${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"'",
                "docker stop isol8 || true",
                "docker rm isol8 || true",
                "docker run -d --name isol8 --env-file /home/ec2-user/.env -e CORS_ORIGINS=${{ env.CORS_ORIGINS }} -p 8000:8000 --restart unless-stopped '"${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"'"
              ]' \
              --query 'Command.CommandId' \
              --output text)

            aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text
          done

      - name: Run database migrations
        run: |
          ASG_NAME="isol8-prod-asg"
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[0].InstanceId' \
            --output text)

          sleep 10

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker exec isol8 python init_db.py --reset"]' \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query '[Status, StandardOutputContent]' --output text

      - name: Health check
        run: |
          API_URL=$(aws apigatewayv2 get-apis --query "Items[?Name=='isol8-prod-api'].ApiEndpoint" --output text)
          echo "Checking health at $API_URL/health"

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --max-time 5 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 5s..."
            sleep 5
          done

          echo "Health check failed"
          exit 1
