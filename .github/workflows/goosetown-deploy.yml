# =============================================================================
# GooseTown Deployment Pipeline
# =============================================================================
# Staggered deployments: dev → staging → prod (with manual approval for prod)
# =============================================================================
name: GooseTown Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/goosetown/**'
      - '.github/workflows/goosetown-deploy.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to specific environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.GOOSETOWN_VERCEL_PROJECT_ID }}

jobs:
  # ===========================================================================
  # Build & Test
  # ===========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @isol8/goosetown run lint

      - name: Type check
        run: pnpm --filter @isol8/goosetown exec tsc --noEmit -p tsconfig.check.json

      - name: Build
        run: pnpm --filter @isol8/goosetown run build
        env:
          VITE_BACKEND_URL: https://api-dev.isol8.co/api/v1
          VITE_WS_URL: wss://ws-dev.isol8.co
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

  # ===========================================================================
  # Deploy to Dev (automatic)
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.town.isol8.co
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Dev
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env VITE_BACKEND_URL=https://api-dev.isol8.co/api/v1 \
            --build-env VITE_WS_URL=wss://ws-dev.isol8.co \
            --build-env VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to dev.town.isol8.co
        run: vercel alias ${{ steps.deploy.outputs.url }} dev.town.isol8.co --token=${{ secrets.VERCEL_TOKEN }}

  # ===========================================================================
  # Deploy to Staging (automatic after dev)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.town.isol8.co
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Staging
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env VITE_BACKEND_URL=https://api-staging.isol8.co/api/v1 \
            --build-env VITE_WS_URL=wss://ws-staging.isol8.co \
            --build-env VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to staging.town.isol8.co
        run: vercel alias ${{ steps.deploy.outputs.url }} staging.town.isol8.co --token=${{ secrets.VERCEL_TOKEN }}

  # ===========================================================================
  # Deploy to Production (requires manual approval)
  # ===========================================================================
  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://town.isol8.co
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Production
        id: deploy
        run: |
          url=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env VITE_BACKEND_URL=https://api.isol8.co/api/v1 \
            --build-env VITE_WS_URL=wss://ws.isol8.co \
            --build-env VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to town.isol8.co
        run: vercel alias ${{ steps.deploy.outputs.url }} town.isol8.co --token=${{ secrets.VERCEL_TOKEN }}
