# =============================================================================
# Terraform Infrastructure Workflow
# =============================================================================
name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'apps/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Apply to specific environment only"
        required: false
        type: choice
        options:
          - all
          - dev
          - staging
          - prod

env:
  TF_VERSION: "1.5"
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Lambda dependencies
        run: |
          pip install -r lambda/websocket-authorizer/requirements.txt \
            -t lambda/websocket-authorizer/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary :all: \
            --upgrade

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config=environments/dev/backend.hcl

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/dev/terraform.tfvars \
            -var="supabase_connection_string=${{ secrets.SUPABASE_CONNECTION_STRING }}" \
            -var="huggingface_token=${{ secrets.HUGGINGFACE_TOKEN }}" \
            -var="clerk_secret_key=${{ secrets.CLERK_SECRET_KEY }}" \
            -var="clerk_webhook_secret=${{ secrets.CLERK_WEBHOOK_SECRET }}" \
            -var="perplexity_api_key=${{ secrets.PERPLEXITY_API_KEY }}" \
            -var="pixellab_api_key=${{ secrets.PIXELLAB_API_KEY }}" \
            -var="town_token_secret=${{ secrets.TOWN_TOKEN_SECRET }}" \
            -var="encryption_key=${{ secrets.ENCRYPTION_KEY }}" \
            -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var="stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            -out=tfplan-dev \
            -no-color
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan - Dev \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: |
            apps/terraform/tfplan-dev
            apps/terraform/lambda/*.zip

  apply-dev:
    name: Apply to Dev
    runs-on: ubuntu-latest
    needs: [plan-dev]
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev'))
    environment:
      name: dev
      url: https://api-dev.isol8.co
    defaults:
      run:
        working-directory: apps/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config=environments/dev/backend.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: apps/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-dev
