  prod-DeployVercelProd:
    name: DeployVercelProd
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - prod-isol8-prod-auth-Deploy
      - prod-isol8-prod-dns-Deploy
      - prod-isol8-prod-database-Deploy
      - prod-isol8-prod-network-Deploy
      - prod-isol8-prod-api-Deploy
      - prod-isol8-prod-container-Deploy
      - prod-isol8-prod-service-Deploy
      - Build-Synth
      - dev-isol8-dev-auth-Deploy
      - dev-isol8-dev-dns-Deploy
      - dev-isol8-dev-database-Deploy
      - dev-isol8-dev-network-Deploy
      - dev-isol8-dev-api-Deploy
      - dev-isol8-dev-container-Deploy
      - dev-isol8-dev-service-Deploy
      - dev-DeployVercelDev
    env: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Frontend (Production)
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_PROD }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
      - name: Deploy to Vercel (Production)
        id: vercel-deploy-prod
        run: DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN) && echo
          "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Alias to app.isol8.co
        run: vercel alias ${{ steps.vercel-deploy-prod.outputs.DEPLOY_URL }}
          app.isol8.co --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
