  dev-DeployVercelDev:
    name: DeployVercelDev
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - dev-isol8-dev-auth-Deploy
      - dev-isol8-dev-dns-Deploy
      - dev-isol8-dev-database-Deploy
      - dev-isol8-dev-network-Deploy
      - dev-isol8-dev-api-Deploy
      - dev-isol8-dev-container-Deploy
      - dev-isol8-dev-service-Deploy
      - Build-Synth
    env: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Settings
        run: vercel pull --yes --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Frontend
        run: vercel build --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_DEV }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_DEV }}
      - name: Deploy to Vercel (Preview)
        id: vercel-deploy-dev
        run: DEPLOY_URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN) && echo
          "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Alias to dev.isol8.co
        run: vercel alias ${{ steps.vercel-deploy-dev.outputs.DEPLOY_URL }} dev.isol8.co
          --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  prod-E2EGate:
    name: E2EGate
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - Build-Synth
      - dev-isol8-dev-auth-Deploy
      - dev-isol8-dev-dns-Deploy
      - dev-isol8-dev-database-Deploy
      - dev-isol8-dev-network-Deploy
      - dev-isol8-dev-api-Deploy
      - dev-isol8-dev-container-Deploy
      - dev-isol8-dev-service-Deploy
      - dev-DeployVercelDev
    env: {}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: cd apps/frontend && npx playwright install chromium --with-deps
      - name: Run E2E gate tests
        run: cd apps/frontend && timeout 1200 npx playwright test --project=chromium ||
          (echo 'E2E tests failed or timed out after 20 min' && exit 1)
        env:
          BASE_URL: https://dev.isol8.co
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_DEV }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_DEV }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_DEV }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
