# =============================================================================
# Frontend Deployment Pipeline
# =============================================================================
# Staggered deployments: dev → staging → prod (with manual approval for prod)
# =============================================================================
name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-deploy.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to specific environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.FRONTEND_VERCEL_PROJECT_ID }}

jobs:
  # ===========================================================================
  # Build & Test
  # ===========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @isol8/frontend run lint

      - name: Type check
        run: pnpm --filter @isol8/frontend exec tsc --noEmit

      - name: Build
        run: pnpm --filter @isol8/frontend run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: https://api-dev.isol8.co/api/v1

  # ===========================================================================
  # Deploy to Dev (automatic)
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.isol8.co
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Dev
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --build-env NEXT_PUBLIC_API_URL=https://api-dev.isol8.co/api/v1)
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to dev.isol8.co
        run: vercel alias ${{ steps.deploy.outputs.url }} dev.isol8.co --token=${{ secrets.VERCEL_TOKEN }}

  # ===========================================================================
  # Deploy to Staging (automatic after dev)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.isol8.co
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Staging
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --build-env NEXT_PUBLIC_API_URL=https://api-staging.isol8.co/api/v1)
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to staging.isol8.co
        run: vercel alias ${{ steps.deploy.outputs.url }} staging.isol8.co --token=${{ secrets.VERCEL_TOKEN }}

  # ===========================================================================
  # Deploy to Production (requires manual approval)
  # ===========================================================================
  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.isol8.co
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Production
        id: deploy
        run: |
          url=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --build-env NEXT_PUBLIC_API_URL=https://api.isol8.co/api/v1)
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to app.isol8.co
        run: vercel alias ${{ steps.deploy.outputs.url }} app.isol8.co --token=${{ secrets.VERCEL_TOKEN }}
