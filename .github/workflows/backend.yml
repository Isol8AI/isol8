# =============================================================================
# Backend CI Workflow (lint + test on PRs)
# Docker build & deploy handled by CDK Pipeline (deploy.yml)
# =============================================================================
name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'

env:
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: apps/backend

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .
        working-directory: apps/backend

      - name: Run tests
        env:
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DYNAMODB_TABLE_PREFIX: isol8-test-
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          DEBUG: "false"
        run: uv run pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        working-directory: apps/backend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage.xml
          fail_ci_if_error: false
