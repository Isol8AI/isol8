# =============================================================================
# Backend CI/CD Workflow
# =============================================================================
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to specific environment only"
        required: false
        type: choice
        options:
          - all
          - dev
          - staging
          - prod

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: isol8-backend

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # CI: Run tests and linting
  # ===========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: isol8_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: apps/backend

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .
        working-directory: apps/backend

      - name: Initialize database schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/isol8_test
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DEBUG: "false"
        run: uv run python init_db.py --reset
        working-directory: apps/backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/isol8_test
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DEBUG: "false"
        run: uv run pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        working-directory: apps/backend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Build: Build and push Docker image to ECR
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Deploy to Dev (automatic via ASG Instance Refresh)
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev'))
      )
    environment:
      name: dev
      url: https://api-dev.isol8.co

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/isol8-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trigger ASG Instance Refresh
        run: |
          ASG_NAME="isol8-dev-asg"

          echo "Triggering instance refresh for $ASG_NAME..."
          echo "New instances will boot with:"
          echo "  - Latest Docker image: ${{ env.ECR_REPOSITORY }}:latest"

          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "Instance refresh started: $REFRESH_ID"
          echo "REFRESH_ID=$REFRESH_ID" >> $GITHUB_ENV

      - name: Wait for Instance Refresh
        run: |
          ASG_NAME="isol8-dev-asg"
          REFRESH_ID=${{ env.REFRESH_ID }}

          echo "Waiting for instance refresh $REFRESH_ID to complete..."

          for i in {1..90}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            PROGRESS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --instance-refresh-ids $REFRESH_ID \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text)

            echo "Status: $STATUS, Progress: ${PROGRESS}%"

            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed with status: $STATUS"
              aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name $ASG_NAME \
                --instance-refresh-ids $REFRESH_ID \
                --query 'InstanceRefreshes[0].StatusReason' \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Timeout waiting for instance refresh"
          exit 1

      - name: Health check
        run: |
          API_URL="https://api-dev.isol8.co"
          echo "Checking health at $API_URL/health"

          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed"
          exit 1

  # ===========================================================================
  # Deploy to Staging (DISABLED - instances stopped to save costs)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: false  # DISABLED - staging instance stopped to save costs
    environment:
      name: staging
      url: https://api-staging.isol8.co
    steps:
      - run: echo "Staging disabled"

  # ===========================================================================
  # Deploy to Production (DISABLED - instances stopped to save costs)
  # ===========================================================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: false  # DISABLED - production instance stopped to save costs
    environment:
      name: production
      url: https://api.isol8.co
    steps:
      - run: echo "Production disabled"
