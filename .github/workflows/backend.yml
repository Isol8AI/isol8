# =============================================================================
# Backend CI Workflow (lint + test on PRs)
# Docker build & deploy handled by CDK Pipeline (deploy.yml)
# =============================================================================
name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend.yml'

env:
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: isol8_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: apps/backend

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .
        working-directory: apps/backend

      - name: Initialize database schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/isol8_test
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DEBUG: "false"
        run: uv run python init_db.py --reset
        working-directory: apps/backend

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/isol8_test
          CLERK_ISSUER: https://test.clerk.accounts.dev
          HUGGINGFACE_TOKEN: test_token
          DEBUG: "false"
        run: uv run pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        working-directory: apps/backend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/backend/coverage.xml
          fail_ci_if_error: false
