# =============================================================================
# GooseTown CI (PRs only)
# =============================================================================
name: GooseTown CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/goosetown/**'
      - '.github/workflows/goosetown-ci.yml'
      - 'pnpm-lock.yaml'

env:
  NODE_VERSION: "20"

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @isol8/goosetown run lint

      - name: Type check
        run: pnpm --filter @isol8/goosetown exec tsc --noEmit -p tsconfig.check.json

      - name: Build
        env:
          VITE_BACKEND_URL: https://api-dev.isol8.co/api/v1
          VITE_WS_URL: wss://ws-dev.isol8.co
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: pnpm --filter @isol8/goosetown run build
