name: Desktop App Build

# Two release tracks, one workflow:
#   desktop-dev-v*  → dev build (points at dev.isol8.co). Internal smoke testing.
#   desktop-v*      → prod build (points at isol8.co).    Public distribution.
# Both cut a draft GitHub release with DMGs attached; approve + publish
# manually to make it visible.
#
# Apple Silicon only. Rationale:
#   - tauri-apps/tauri#12160: universal DMG unsupported, per-arch builds required.
#   - actions/runner-images#12482: macos-latest (14) has a broken hdiutil
#     flow since 2025-06-19 Provisioner bump. macos-15 dodges it.
#   - macos-13 Intel runners are on GitHub's deprecation path; queue depths
#     are in hours. Ship what works; revisit Intel via cross-compile later.
on:
  push:
    tags:
      - 'desktop-v*'
      - 'desktop-dev-v*'
  workflow_dispatch:

jobs:
  build:
    # Apple Silicon only for now. GitHub's macos-13 Intel runners are
    # deprecation-path backlogged (queue depth hours on 2026-04-22).
    # 90%+ of new Mac users are Apple Silicon; ship what works. When
    # Intel demand surfaces, re-add an x86_64 leg — probably via
    # cross-compile from macos-15 rather than another native runner
    # (issue with GH Intel queue is systemic, not transient).
    runs-on: macos-15
    # tauri-action creates a draft release + uploads artifacts via the
    # GitHub REST API using GITHUB_TOKEN. Default token is read-only
    # for contents; grant write so create-release doesn't 403.
    permissions:
      contents: write
    env:
      RUST_TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      # pnpm version governed by the root package.json#packageManager field
      # (pnpm@9.15.0). Pinning a second time here triggers
      # ERR_PNPM_BAD_PM_VERSION when the two disagree.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGET }}

      - name: Install dependencies
        run: pnpm install

      # Tag prefix decides which environment endpoints the bundle
      # points at. Keeps one workflow, two outputs.
      - name: Resolve target environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/desktop-dev-v* ]]; then
            echo "target_env=dev" >> "$GITHUB_OUTPUT"
            echo "frontend_url=https://dev.isol8.co/chat" >> "$GITHUB_OUTPUT"
            echo "callback_url=https://dev.isol8.co/auth/desktop-callback" >> "$GITHUB_OUTPUT"
            echo "release_name=Isol8 Desktop [DEV] ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/desktop-v* ]]; then
            echo "target_env=prod" >> "$GITHUB_OUTPUT"
            echo "frontend_url=https://isol8.co/chat" >> "$GITHUB_OUTPUT"
            echo "callback_url=https://isol8.co/auth/desktop-callback" >> "$GITHUB_OUTPUT"
            echo "release_name=Isol8 Desktop ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch or future branch push — default to dev
            # so we never accidentally ship a prod-pointing binary from
            # a non-tag trigger.
            echo "target_env=dev" >> "$GITHUB_OUTPUT"
            echo "frontend_url=https://dev.isol8.co/chat" >> "$GITHUB_OUTPUT"
            echo "callback_url=https://dev.isol8.co/auth/desktop-callback" >> "$GITHUB_OUTPUT"
            echo "release_name=Isol8 Desktop [DEV] dispatch" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch tauri.conf.json for ${{ steps.env.outputs.target_env }}
        run: |
          TAURI_CFG="apps/desktop/src-tauri/tauri.conf.json"
          # Patch URLs for the target environment.
          jq --arg url "${{ steps.env.outputs.frontend_url }}" '
            .build.devUrl = $url |
            .build.frontendDist = $url |
            .app.windows[0].url = $url
          ' "$TAURI_CFG" > "$TAURI_CFG.new"
          mv "$TAURI_CFG.new" "$TAURI_CFG"
          # Dev builds skip codesigning. Runners have no Developer ID cert
          # in the keychain (we only supply APPLE_ID for notarization).
          # Strip signingIdentity so Tauri produces an unsigned DMG —
          # testers bypass Gatekeeper via right-click > Open. Prod builds
          # require a .p12 imported via APPLE_CERTIFICATE /
          # APPLE_CERTIFICATE_PASSWORD secrets (separate follow-up).
          if [[ "${{ steps.env.outputs.target_env }}" == "dev" ]]; then
            jq 'del(.bundle.macOS.signingIdentity)' "$TAURI_CFG" > "$TAURI_CFG.new"
            mv "$TAURI_CFG.new" "$TAURI_CFG"
            echo "Dev build: stripped signingIdentity (unsigned DMG)"
          fi
          echo "Patched tauri.conf.json:"
          jq '{devUrl: .build.devUrl, frontendDist: .build.frontendDist, windowUrl: .app.windows[0].url, signingIdentity: .bundle.macOS.signingIdentity}' "$TAURI_CFG"

      # Vendor Node.js + pinned `openclaw` npm package for THIS arch only.
      # Previously vendored both arches for the universal build; with the
      # per-arch matrix each job only needs its own.
      - name: Vendor browser sidecar (${{ env.RUST_TARGET }})
        run: bash apps/desktop/src-tauri/scripts/vendor-sidecars.sh ${{ env.RUST_TARGET }}

      - name: Build desktop app (${{ env.RUST_TARGET }})
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ steps.env.outputs.release_name }}
          releaseDraft: true
          prerelease: true
          args: --target ${{ env.RUST_TARGET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ISOL8_CALLBACK_URL: ${{ steps.env.outputs.callback_url }}
