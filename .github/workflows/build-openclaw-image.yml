name: build-openclaw-image
on:
  push:
    branches:
      - main
    paths:
      - "apps/infra/openclaw/Dockerfile"
      - "openclaw-version.json"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build and push extended OpenClaw image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read version metadata
        id: meta
        run: |
          UPSTREAM=$(node -p "require('./openclaw-version.json').upstream.split(':')[1]")
          IMAGE=$(node -p "require('./openclaw-version.json').extendedImage")
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${UPSTREAM}-${SHORT_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream=${UPSTREAM}" >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${TAG} (FROM alpine/openclaw:${UPSTREAM})"

      - name: Guard against hardcoded openclaw tag
        # The Dockerfile must source its base image via the UPSTREAM build-arg
        # so openclaw-version.json#upstream is the only source of truth.
        # A literal tag in a FROM line means tag drift is back.
        run: |
          if grep -nE '^FROM[[:space:]].*alpine/openclaw:[^$]' apps/infra/openclaw/Dockerfile; then
            echo "::error::Hardcoded openclaw tag in Dockerfile FROM line — must use \${UPSTREAM} build-arg from openclaw-version.json#upstream"
            exit 1
          fi

      - name: Authenticate Via OIDC Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-duration-seconds: 1800
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::877352799272:role/isol8-openclaw-image-builder

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            --build-arg "UPSTREAM=${{ steps.meta.outputs.upstream }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            apps/infra/openclaw/

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"

      - name: Summary
        run: |
          echo "## Built image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Bump \`openclaw-version.json#dev.tag\` to \`${{ steps.meta.outputs.tag }}\` in a PR to deploy to dev." >> "$GITHUB_STEP_SUMMARY"
