name: build-openclaw-image
on:
  push:
    branches:
      - main
    paths:
      - "apps/infra/openclaw/Dockerfile"
      - "openclaw-version.json"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build and push extended OpenClaw image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read version metadata
        id: meta
        run: |
          UPSTREAM=$(node -p "require('./openclaw-version.json').upstream.split(':')[1]")
          IMAGE=$(node -p "require('./openclaw-version.json').extendedImage")
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${UPSTREAM}-${SHORT_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building ${IMAGE}:${TAG}"

      - name: Authenticate Via OIDC Role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-duration-seconds: 1800
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::877352799272:role/isol8-openclaw-image-builder

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            apps/infra/openclaw/

      # NOTE: we deliberately do NOT `docker push` here. Our ECR repo has tag
      # immutability enabled, and the SOCI v2 step below pushes a different
      # manifest (the SOCI-enabled OCI artifact) under the same tag. If we
      # docker-pushed first, ECR would lock the tag and reject the SOCI push
      # with "tag is immutable" (PR #438/#440 builds hit exactly this). The
      # SOCI step imports the docker-built image into containerd via
      # `docker save | nerdctl image load` and pushes from there — single
      # ECR push, immutable tag claimed by the SOCI v2 manifest.

      - name: Set up containerd
        uses: crazy-max/ghaction-setup-containerd@v3

      - name: Convert image to SOCI v2 and push
        env:
          SOCI_VERSION: "0.13.0"
          NERDCTL_VERSION: "2.2.2"
          IMAGE_REF: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
        # Fargate refuses SOCI Index Manifest v1 for accounts that didn't
        # already use SOCI before 2025-07-03 (per AWS containers blog
        # "improving-amazon-ecs-deployment-consistency-with-soci-index-manifest-v2").
        # We're a new customer, so v1 silently falls back to a full pull.
        # `soci convert` produces a v2 SOCI-enabled image (single OCI artifact
        # with the index attached). We push it under the deploy tag — the
        # only push to ECR for this tag (no docker push first).
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/awslabs/soci-snapshotter/releases/download/v${SOCI_VERSION}/soci-snapshotter-${SOCI_VERSION}-linux-amd64-static.tar.gz" \
            | sudo tar -xz -C /usr/local/bin/ soci
          sudo chmod +x /usr/local/bin/soci

          # `crazy-max/ghaction-setup-containerd@v3` installs containerd + ctr,
          # but not nerdctl. Pull the static binary from upstream releases.
          # nerdctl is required (per upstream cli-usage.md) for v2 push —
          # it uploads child blobs before committing the index manifest,
          # which is what ECR's strict validation expects.
          curl -sSL "https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/nerdctl-${NERDCTL_VERSION}-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin/ nerdctl
          sudo chmod +x /usr/local/bin/nerdctl

          # Authenticate nerdctl to ECR.
          ECR_PASSWORD=$(aws ecr get-login-password --region us-east-1)
          REGISTRY="$(echo "${IMAGE_REF}" | cut -d/ -f1)"
          echo "${ECR_PASSWORD}" | sudo nerdctl login --username AWS --password-stdin "${REGISTRY}"

          # Import the docker-built image into containerd's content store.
          # `docker save` streams the image; `nerdctl image load` ingests it.
          # Both use the same containerd backend so soci convert sees it next.
          docker save "${IMAGE_REF}" | sudo nerdctl image load

          # Convert to a SOCI v2 image. Requires src != dst, so we stage
          # under a -soci-staging suffix and re-tag onto the deploy ref.
          sudo soci convert --platform linux/amd64 "${IMAGE_REF}" "${IMAGE_REF}-soci-staging"
          sudo nerdctl rmi "${IMAGE_REF}" || true
          sudo nerdctl tag "${IMAGE_REF}-soci-staging" "${IMAGE_REF}"

          # Push the SOCI v2 image — first push to ECR for this tag, no
          # immutability conflict.
          sudo nerdctl push --platform linux/amd64 "${IMAGE_REF}"

      - name: Summary
        run: |
          echo "## Built image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Bump \`openclaw-version.json#dev.tag\` to \`${{ steps.meta.outputs.tag }}\` in a PR to deploy to dev." >> "$GITHUB_STEP_SUMMARY"
